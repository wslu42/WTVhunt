<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找蛋挑戰 🥚</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="container">
    <h1>🥚🐰🥚<br>BUNNY RUN<br>🐰🥚🐰</h1>
    <p class="subtitle">🐰 嘿！我～是復活節兔兔，準～備好接受我的找蛋挑戰了嗎？  
  每～顆蛋裡都～有密碼🔢，快輸～入密碼👇看看你～能不能順利通過我的考驗！</p>

    <div class="progress-wrap">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText" class="progress-text">目前進度：0 / 32</p>
    </div>

   <div class="input-row">
     <input id="codeInput" type="tel" inputmode="numeric" maxlength="4" placeholder="輸入密碼">
   
     <div class="btn-group">
       <button id="submitBtn">解鎖🔐</button>
       <button id="resetBtn" class="reset-btn">重來🔄</button>
     </div>
   </div>

    <div id="responseBanner" class="response-banner hidden"></div>

    <div id="result" class="result-card hidden">
      <h2 id="stageTitle"></h2>
      <div id="clue" class="clue-text"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
